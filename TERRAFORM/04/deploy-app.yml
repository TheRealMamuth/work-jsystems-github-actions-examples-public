---
- name: Deploy aplikacji w Dockerze
  hosts: all
  become: true

  vars:
    container_name: pogoda_api
    app_port: 8000

  tasks:

    # -------------------------
    # SYSTEM
    # -------------------------

    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Instaluj zależności
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present

    # -------------------------
    # CLEANUP (ważne!)
    # -------------------------

    - name: Usuń stary klucz Dockera jeśli istnieje
      file:
        path: /etc/apt/keyrings/docker.gpg
        state: absent

    - name: Usuń stare repo Dockera jeśli istnieje
      file:
        path: /etc/apt/sources.list.d/docker.list
        state: absent

    # -------------------------
    # DOCKER REPO (FIX 2026)
    # -------------------------

    - name: Utwórz katalog keyrings
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: '0755'

    - name: Pobierz klucz Dockera
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /tmp/docker.gpg
        mode: '0644'

    - name: Konwertuj klucz do formatu binarnego (dearmor)
      command: gpg --dearmor -o /etc/apt/keyrings/docker.gpg /tmp/docker.gpg
      args:
        creates: /etc/apt/keyrings/docker.gpg

    - name: Ustaw prawa do klucza
      file:
        path: /etc/apt/keyrings/docker.gpg
        mode: '0644'

    - name: Dodaj repo Dockera
      copy:
        dest: /etc/apt/sources.list.d/docker.list
        content: |
          deb [arch={{ ansible_facts['architecture'] }} signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu {{ ansible_facts['distribution_release'] }} stable

    - name: Update apt cache po dodaniu repo
      apt:
        update_cache: yes

    # -------------------------
    # DOCKER INSTALL
    # -------------------------

    - name: Instaluj Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        state: present

    - name: Uruchom Docker
      service:
        name: docker
        state: started
        enabled: true

    # -------------------------
    # DOCKER IMAGE
    # -------------------------

    - name: Pull obrazu
      community.docker.docker_image:
        name: "{{ docker_image }}"
        source: pull

    # -------------------------
    # CONTAINER
    # -------------------------

    - name: Usuń stary kontener
      community.docker.docker_container:
        name: "{{ container_name }}"
        state: absent

    - name: Uruchom kontener
      community.docker.docker_container:
        name: "{{ container_name }}"
        image: "{{ docker_image }}"
        state: started
        restart_policy: always
        recreate: true
        ports:
          - "8080:{{ app_port }}"
        env:
          OPENWEATHER_API_KEY: "{{ openweather_api_key }}"
