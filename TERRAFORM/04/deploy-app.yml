---
- name: Deploy aplikacji w Dockerze
  hosts: all
  become: true

  vars:
    container_name: pogoda_api
    app_port: 8000

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Instaluj zależności
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        state: present

    - name: Dodaj repozytorium Dockera
      shell: |
        install -m 0755 -d /etc/apt/keyrings
        curl -fsSL https://download.docker.com/linux/ubuntu/gpg | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
        chmod a+r /etc/apt/keyrings/docker.gpg
        echo \
          "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] https://download.docker.com/linux/ubuntu \
          $(. /etc/os-release && echo $VERSION_CODENAME) stable" \
          > /etc/apt/sources.list.d/docker.list

    - name: Update apt cache po dodaniu repo
      apt:
        update_cache: yes

    - name: Instaluj Docker
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present

    - name: Uruchom Docker
      service:
        name: docker
        state: started
        enabled: true

    - name: Pull obrazu
      community.docker.docker_image:
        name: "{{ docker_image }}"
        source: pull

    - name: Usuń stary kontener
      community.docker.docker_container:
        name: "{{ container_name }}"
        state: absent

    - name: Uruchom kontener
      community.docker.docker_container:
        name: "{{ container_name }}"
        image: "{{ docker_image }}"
        state: started
        restart_policy: always
        ports:
          - "8080:{{ app_port }}"
        env:
          OPENWEATHER_API_KEY: "{{ openweather_api_key }}"
